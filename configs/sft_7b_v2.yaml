model:
  name: Qwen/Qwen2.5-Math-7B-Instruct
  torch_dtype: float16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: /content/drive/MyDrive/AIMO/checkpoints_v2
  max_seq_len: 2048
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  num_train_epochs: 1
  warmup_steps: 100
  lr_scheduler_type: cosine
  fp16: false
  bf16: true
  gradient_checkpointing: true
  per_device_eval_batch_size: 1
  logging_steps: 10
  save_strategy: steps
  save_steps: 200
  save_total_limit: 3
  report_to: wandb
  run_name: qwen2.5-math-7b-lora-r16_v2
  dataloader_num_workers: 0

data:
  train_path: /content/drive/MyDrive/AIMO/data/processed/train.jsonl
  val_path: /content/drive/MyDrive/AIMO/data/processed/val.jsonl
